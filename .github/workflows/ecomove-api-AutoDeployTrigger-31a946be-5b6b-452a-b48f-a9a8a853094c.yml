name: Trigger auto deployment for ecomove-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ecomove-api-AutoDeployTrigger-31a946be-5b6b-452a-b48f-a9a8a853094c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ECOMOVEAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ECOMOVEAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ECOMOVEAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ecomoveregistry.azurecr.io
          registryUsername: ${{ secrets.ECOMOVEAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ECOMOVEAPI_REGISTRY_PASSWORD }}
          containerAppName: ecomove-api
          resourceGroup: demos_romi
          imageToBuild: ecomoveregistry.azurecr.io/ecomove-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


